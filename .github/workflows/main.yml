name: YouTube Shorts Downloader

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  download-shorts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Run Shorts Downloader
        run: |
          python shorts_downloader.py

      - name: Upload downloads
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-shorts
          # Fixed: script actually saves under downloads/session_*/, the old
          # path (session_*/short_*.mp4) never matched anything.
          path: downloads/session_*/short_*.mp4
          retention-days: 7
          if-no-files-found: warn

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Auto: Downloaded shorts $(date)" || echo "Nothing to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
