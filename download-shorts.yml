name: YouTube Shorts Downloader

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  download-shorts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
          
      - name: Create downloads directory
        run: |
          mkdir -p downloads
          
      - name: Run Shorts Downloader
        run: |
          python shorts_downloader.py
          
      - name: List downloaded files
        if: always()
        run: |
          echo "📁 Downloaded files:"
          find downloads -type f -name "*.mp4" -o -name "*.json" -o -name "*_caption.txt" | head -20
          
      - name: Commit and push changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Auto: Downloaded shorts $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
        continue-on-error: true
